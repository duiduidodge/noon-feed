app = "noon-feed-worker"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.worker"

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  REDIS_URL = "redis://127.0.0.1:6379"
  ENABLE_OPPORTUNITY_SIGNALS = "true"
  OPPORTUNITY_SIGNALS_INTERVAL_SECONDS = "300"
  OPPORTUNITY_MIN_SCORE = "190"
  OPPORTUNITY_VOLATILE_SCORE_BONUS = "10"
  OPPORTUNITY_MIN_SCAN_STREAK = "2"
  OPPORTUNITY_REQUIRE_EMA_BOUNCE = "false"
  OPPORTUNITY_EMA_BOUNCE_MIN_CONFLUENCE = "2"
  OPPORTUNITY_BLOCK_RANGING_REGIME = "false"
  OPPORTUNITY_MIN_VOL_RATIO = "0.6"
  ENABLE_EMERGING_MOVERS_SIGNALS = "false"
  EMERGING_MOVERS_COMMAND = "EMERGING_HISTORY='/tmp/emerging-movers-history.json' python3 '/app/skills/emerging-movers/scripts/emerging-movers.py'"
  EMERGING_MOVERS_INTERVAL_SECONDS = "60"
  ENABLE_WHALE_SIGNALS = "false"
  WHALE_SIGNALS_INTERVAL_SECONDS = "1800"
  WHALE_RISK_PROFILE = "moderate"
  ENABLE_HIGH_IMPACT_POSTING = "false"
  BREAKING_NEWS_ALLOW_MEDIUM_IMPACT = "true"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
